<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard FINAL</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family: -apple-system, Segoe UI;
    overflow:hidden;
}

/* glass */
.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
}

.glow {
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* layout */
#location { position:absolute; top:20px; left:40px; font-size:54px; }
#tempNow { margin-top:20px; font-size:32px; }

#clock-box { position:absolute; top:20px; right:40px; text-align:right; }
#time { font-size:160px; }
#dateWeek { font-size:36px; }

#weather {
    position:absolute;
    top:160px;
    left:40px;
    font-size:32px;
    line-height:1.8;
}

#nameday {
    position:absolute;
    top:360px;
    right:40px;
    font-size:32px;
}

/* world */
#world {
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city {
    text-align:center;
}

.place {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:22px;
    margin-bottom:10px;
}

.flag {
    width:32px;
    height:22px;
    object-fit:cover;
    border-radius:4px;
}

.city-time {
    font-size:40px; /* ✅ VEĽKÉ */
    margin-bottom:6px;
}

.city-weather {
    font-size:26px;
}

</style>
</head>

<body>

<div id="location" class="glow">
    Vráble
    <div id="tempNow"></div>
</div>

<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek"></div>
</div>

<div id="weather" class="glass"></div>
<div id="nameday" class="glass"></div>

<div id="world">

    <div class="city glass">
        <div class="place">
            <img class="flag" src="https://flagcdn.com/w40/mx.png">
            Mexiko – Ramos Arizpe
        </div>
        <div class="city-time" id="ramos"></div>
        <div class="city-weather" id="ramosw"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img class="flag" src="https://flagcdn.com/w40/us.png">
            USA – Detroit
        </div>
        <div class="city-time" id="detroit"></div>
        <div class="city-weather" id="detroitw"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img class="flag" src="https://flagcdn.com/w40/in.png">
            India – Pune
        </div>
        <div class="city-time" id="pune"></div>
        <div class="city-weather" id="punew"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img class="flag" src="https://flagcdn.com/w40/cn.png">
            Čína – Suzhou
        </div>
        <div class="city-time" id="suzhou"></div>
        <div class="city-weather" id="suzhouw"></div>
    </div>

</div>

<script>

// ISO týždeň
function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

// čas
function updateTime(){
    const now=new Date();

    document.getElementById("time").innerText =
        now.toLocaleTimeString("sk-SK");

    let day = now.toLocaleDateString("sk-SK",{weekday:"long"});
    day = day.charAt(0).toUpperCase()+day.slice(1);

    document.getElementById("dateWeek").innerText =
        day+" "+
        now.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})
        +" • týždeň "+getISOWeek(now);
}

// svet čas 24h
function world(){
    const zones={
        ramos:"America/Monterrey",
        detroit:"America/Detroit",
        pune:"Asia/Kolkata",
        suzhou:"Asia/Shanghai"
    };

    for(let id in zones){
        document.getElementById(id).innerText =
        new Date().toLocaleTimeString("sk-SK",{timeZone:zones[id],hour12:false});
    }
}

// meniny
function updateNameday(){
    document.getElementById("nameday").innerHTML =
        "Dnes má meniny: Karolína<br>"+
        "Zajtra má meniny: Lenka";
}

// Google-like ikonky
function icon(t){
    if(t>=30) return "☀️";      // slnko
    if(t>=24) return "🌤️";     // polojasno
    if(t>=20) return "⛅";      // oblaky
    if(t>=15) return "🌧️";     // dážď
    return "🌩️";
}

// počasie
async function loadWeather(){
    const res=await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Europe/Bratislava"
    );
    const data=await res.json();
    const d=data.daily;

    document.getElementById("tempNow").innerText =
        "Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°";

    document.getElementById("weather").innerHTML =
        "Dnes: "+icon(d.temperature_2m_max[0])+" "+Math.round(d.temperature_2m_max[0])+"° / "+Math.round(d.temperature_2m_min[0])+"°<br>"+
        "Zajtra: "+icon(d.temperature_2m_max[1])+" "+Math.round(d.temperature_2m_max[1])+"° / "+Math.round(d.temperature_2m_min[1])+"°<br>"+
        "Pozajtra: "+icon(d.temperature_2m_max[2])+" "+Math.round(d.temperature_2m_max[2])+"° / "+Math.round(d.temperature_2m_min[2])+"°";
}

// svet počasie
async function worldWeather(){
    const cities={
        ramos:[25.54,-100.94,"ramosw"],
        detroit:[42.33,-83.05,"detroitw"],
        pune:[18.52,73.85,"punew"],
        suzhou:[31.30,120.62,"suzhouw"]
    };

    for(let key in cities){
        const [lat,lon,id]=cities[key];

        const res=await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&timezone=auto`
        );

        const data=await res.json();
        const temp=Math.round(data.daily.temperature_2m_max[0]);

        document.getElementById(id).innerText =
            icon(temp)+" "+temp+"°";
    }
}

// loop
setInterval(()=>{
    updateTime();
    world();
},1000);

// init
updateTime();
world();
updateNameday();
loadWeather();
worldWeather();

// auto refresh
setInterval(()=>{
    location.reload();
},900000);

</script>

</body>
</html>
