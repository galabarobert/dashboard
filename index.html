<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>

<style>
body {
    margin:0;
    background: linear-gradient(135deg, #0a0015 0%, #1a0033 25%, #003366 50%, #001a33 75%, #0a0015 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color:white;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    position: relative;
    overflow: hidden;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 200, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(255, 0, 128, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.glass {
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(50px) saturate(200%);
    -webkit-backdrop-filter:blur(50px) saturate(200%);
    border:1.5px solid rgba(255,255,255,0.25);
    border-radius:30px;
    padding:15px;
    box-shadow: 
        0 0 40px rgba(138, 43, 226, 0.3),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 0 20px rgba(255,255,255,0.1);
}

.glow {text-shadow:0 0 15px rgba(255,255,255,0.4);}

#location {position:absolute;top:1px;left:40px;font-size:86px;}
#tempNow {margin-top:12px;font-size:32px;}

#clock-box {position:absolute;top:-37px;right:40px;text-align:right;}
#time {font-size:200px;}
#dateWeek {font-size:45px;margin-top:-38px;}

#weather {position:absolute;top:174px;left:40px;font-size:28px;line-height:1.8;width:auto;white-space:nowrap;height:50px;display:flex;align-items:center;}
#daysSat {position:absolute;top:272px;left:40px;font-size:28px;text-align:center;width:140px;}
#daysSun {position:absolute;top:272px;left:230px;font-size:28px;text-align:center;width:140px;}
#daysMon {position:absolute;top:272px;left:420px;font-size:28px;text-align:center;width:140px;}
#sun {position:absolute;top:387px;right:40px;font-size:28px;text-align:right;line-height:1.5;}
#nameday {position:absolute;top:262px;right:40px;font-size:31px;text-align:left;}

#world{
    position:absolute;
    bottom:103px;
    width:100%;
    display:flex;
    justify-content:flex-end;
    gap:15px;
    padding-left:40px;
    padding-right:520px;
    box-sizing: border-box;
    flex-wrap: nowrap;
    overflow-x: auto;
}

.city{
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:5px;
    white-space:nowrap;
    flex-shrink:0;
}

.place{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:18px;
    margin:0;
    justify-content:center;
}

.city-time{
    font-size:26px;
    margin:0;
    display:inline;
}

.city-weather{
    font-size:22px;
    margin:0;
    display:inline;
    margin-left:10px;
}
    margin-left:6px;
}

.time-weather{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
}

.flag{width:20px;height:12px;}

#shiftBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:38px;
    text-align:center;
}
#lunchTime{font-size:28px;margin-bottom:10px;}

#currentWeatherBox{
    position:absolute;
    top:108px;
    left:40px;
    font-size:45px;
    text-align:left;
    width:auto;
    white-space:nowrap;
    height:50px;
    display:flex;
    align-items:center;
}

#vacationBox{
    position:absolute;
    top:12px;
    left:45%;
    transform:translateX(-50%);
    font-size:38px;
    text-align:center;
}
#vacationTime{font-size:28px;color:white;}

#nhl {position:absolute;top:238px;left:40px;margin-top:280px;font-size:20px;line-height:1.8;width:462px;}

#auditsTable {
    position:absolute;
    top:557px;
    right:40px;
    width:auto;
    min-width:400px;
    max-width:500px;
    font-size:14px;
    text-align:center;
}

.nhl-game {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
}

.game-live {
    animation: pulse 1s infinite;
    color: #ff3b3b;
    font-weight: bold;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}
</style>
</head>

function getNameday(d){
  let key = d.getDate()+"."+(d.getMonth()+1);
  let entry = MENINY[key];
  return entry ? entry[0] : "–";
}

// FORMAT
function format(sec){
  sec=Math.floor(sec);
  let h=Math.floor(sec/3600);
  let m=Math.floor((sec%3600)/60);
  let s=sec%60;
  return `${h}h ${m}m ${s}s`;
}

// IKONY
function icon(code){
  if([0].includes(code)) return "🌞";           // Clear - slnečno
  if([1,2].includes(code)) return "⛅";         // Partly cloudy - čiastočne oblačno
  if([3].includes(code)) return "☁️";           // Overcast - oblačno
  if([45,48].includes(code)) return "🌫️";      // Fog - hmla
  if([51,53,55].includes(code)) return "🌦️";   // Drizzle - mrholenie
  if([61,63,65].includes(code)) return "🌧️";   // Rain - dážď
  if([71,73,75].includes(code)) return "❄️";    // Snow - sneh
  if([77].includes(code)) return "🌨️";         // Snow grains - snehy zrnka
  if([80,81,82].includes(code)) return "⛈️";   // Rain showers - lejaky
  if([85,86].includes(code)) return "🌨️";      // Snow showers - snehové zrážky
  if([95,96,99].includes(code)) return "⚡";    // Thunderstorm - búrka
  return "🌤️";
}

function windDir(deg){
  const d=["S","SV","V","JV","J","JZ","Z","SZ"];
  return d[Math.round(deg/45)%8];
}

function getDirection(deg){
  if(deg>=315||deg<45)return"od Nitry";
  if(deg<135)return"od Levíc";
  if(deg<225)return"od Nových Zámkov";
  return"od Zlatých Moraviec";
}

// ISO TÝŽDEŇ
function getISOWeek(d){
  const date=new Date(d);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const week1=new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-week1)/86400000)/7);
}

// ČIAS + DÁTUM
function updateTime(){
  const n=new Date();
  time.innerText=n.toLocaleTimeString("sk-SK",{hour12:false});
  let d=n.toLocaleDateString("sk-SK",{weekday:"long"});
  d=d.charAt(0).toUpperCase()+d.slice(1);
  dateWeek.innerText=d+" "+n.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})+" • týždeň "+getISOWeek(n);
}

// MENINY – aktualizuje každý deň automaticky
let lastNamedayDate = -1;

function updateNameday(){
  const n = new Date();
  const today = n.getDate();
  if(today === lastNamedayDate) return;
  lastNamedayDate = today;

  const tomorrow = new Date(n);
  tomorrow.setDate(tomorrow.getDate()+1);

  const todayName   = getNameday(n);
  const tomorrowName = getNameday(tomorrow);

  nameday.innerHTML = "Dnes má meniny: " + todayName + "<br>Zajtra má meniny: " + tomorrowName;
}

// SLNKO - VÝCHOD/ZÁPAD + MESIAC
async function loadSun(){
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=sunrise,sunset&timezone=Europe%2FBratislava&forecast_days=1");
    const data = await res.json();
    
    const sunrise = new Date(data.daily.sunrise[0]).toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
    const sunset = new Date(data.daily.sunset[0]).toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
    
    // Výpočet fázy mesiaca - DO SPLNÉHO MESIACA (30. júna 2026)
    const now = new Date();
    const fullMoonDate = new Date(2026, 5, 30, 1, 57); // 30. jún 2026
    const lunarCycle = 29.53;
    
    // New moon pre tento cyklus (14.765 dní pred full moon)
    let newMoonDate = new Date(fullMoonDate.getTime() - (14.765 * 24 * 60 * 60 * 1000));
    
    // Ak je new moon v budúcnosti, vezmem predchádzajúci cyklus
    while (newMoonDate > now) {
      newMoonDate = new Date(newMoonDate.getTime() - (lunarCycle * 24 * 60 * 60 * 1000));
    }
    
    // Dní od new moonu
    const daysSinceNewMoon = (now - newMoonDate) / (1000 * 60 * 60 * 24);
    
    // Správny piktogram a názov fázy podľa lunárneho veku
    let moonEmoji = '🌑';
    let moonName = 'Nový mesiac';
    
    if (daysSinceNewMoon < 1.84) { moonEmoji = '🌑'; moonName = 'Nový mesiac'; }
    else if (daysSinceNewMoon < 7.38) { moonEmoji = '🌒'; moonName = 'Rastúci srpok'; }
    else if (daysSinceNewMoon < 9.23) { moonEmoji = '🌓'; moonName = 'Prvá štvť'; }
    else if (daysSinceNewMoon < 14.77) { moonEmoji = '🌔'; moonName = 'Rastúci mesiac'; }
    else if (daysSinceNewMoon < 16.61) { moonEmoji = '🌕'; moonName = 'Spln'; }
    else if (daysSinceNewMoon < 22.15) { moonEmoji = '🌖'; moonName = 'Ubúdajúci mesiac'; }
    else if (daysSinceNewMoon < 23.99) { moonEmoji = '🌗'; moonName = 'Posledná štvť'; }
    else { moonEmoji = '🌘'; moonName = 'Ubúdajúci srpok'; }
    
    // Skontroluj či je dnes new moon alebo full moon
    const today = new Date();
    const isNewMoonDay = today.getDate() === newMoonDate.getDate() && today.getMonth() === newMoonDate.getMonth();
    if (isNewMoonDay) moonName = 'Now';
    
    // Nový formát - tri riadky s názvami
    document.getElementById('sun').innerHTML = `Východ slnka: ☀️ ${sunrise}<br>Západ slnka: 🌙 ${sunset}<br>Fáza mesiaca: ${moonEmoji} ${moonName}`;
  } catch (err) {
    document.getElementById('sun').innerHTML = "☀️ Slnko: Chyba";
  }
}

// FIFA MS 2026 - futbalové zápasy s LIVE refresh a auto-switch
let currentMatchDayIndex = 0;

async function loadNHL(){
  try {
    const today = new Date();
    
    // Hľadaj najbližší deň s zápasmi (nasledujúcich 30 dní) + offset pre next days
    let matchDay = null;
    let matchDate = null;
    
    for (let i = currentMatchDayIndex; i < 30; i++) {
      const checkDate = new Date(today);
      checkDate.setDate(checkDate.getDate() + i);
      const dateFormat = checkDate.toISOString().split('T')[0];
      
      try {
        const apiUrl = `https://api.football-data.org/v4/competitions/WC/matches?dateFrom=${dateFormat}&dateTo=${dateFormat}`;
        const response = await fetch(apiUrl, {
          method: 'GET',
          headers: {
            'X-Auth-Token': 'INSERT_YOUR_TOKEN'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          if (data.matches && data.matches.length > 0) {
            matchDay = data.matches;
            matchDate = dateFormat;
            break;
          }
        }
      } catch (e) {
        continue;
      }
    }
    
    let filaHTML = "⚽ FIFA MS 2026:<div style='height:1px;background:rgba(255,255,255,0.2);margin:10px 0;'></div>";
    
    if (!matchDay || matchDay.length === 0) {
      filaHTML += "Žiadne zápasy";
    } else {
      // Zobraz len zápasy z aktualneho hraceho dňa
      filaHTML += "<div style='font-weight:bold;margin-bottom:10px;'>Hrací deň:</div>";
      
      let allFinished = true;
      
      matchDay.forEach(match => {
        const away = match.awayTeam.name;
        const home = match.homeTeam.name;
        const status = match.status;
        const time = new Date(match.utcDate).toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});

        let statusDisplay = '';
        if (status === 'LIVE') {
          statusDisplay = `<span class="game-live">● LIVE ${match.score.fullTime.away}-${match.score.fullTime.home}</span>`;
          allFinished = false;
        } else if (status === 'FINISHED') {
          statusDisplay = `<span style="color:#00ff88;">✓ ${match.score.fullTime.away}-${match.score.fullTime.home}</span>`;
        } else {
          statusDisplay = time;
          allFinished = false;
        }

        filaHTML += `<div style='display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);'>
          <div><strong>${away} vs ${home}</strong></div>
          <div style='text-align:right;'>${statusDisplay}</div>
        </div>`;
      });
      
      // Ak sú všetky zápasy skončené - switch na ďalší deň
      if (allFinished && matchDay.length > 0) {
        const lastMatchTime = new Date(matchDay[matchDay.length - 1].utcDate);
        const now = new Date();
        // Ak je posledný zápas skončený pred > 1 hodinou, prepni na ďalší deň
        if (now - lastMatchTime > 3600000) {
          currentMatchDayIndex++;
        }
      }
    }

    document.getElementById('nhl').innerHTML = filaHTML;
  } catch (err) {
    console.error('FIFA Error:', err);
    loadFIFAFallback();
  }
}

let shiftAlertPlayed=false;

function updateShift(){
  const n=new Date();
  const s=new Date(); s.setHours(7,0,0,0);
  const e=new Date(); e.setHours(15,0,0,0);
  const a=new Date(); a.setHours(14,45,0,0); // Alert o 14:45

  let text="",color="white";

  // Zobrazuj iba ak je POČAS SMENY (7:00-15:00)
  if(n>=s && n<=e){
    let diff=(e-n)/1000;
    color="white";
    text="Do konca zmeny: "+format(diff);
    shiftTime.style.display="block";
    
    // Zvuk keď je čas 14:45-14:50
    if(n>=a && n<new Date(a.getTime()+5*60000) && !shiftAlertPlayed){
      playAlert();
      shiftAlertPlayed=true;
    }
  } else {
    // Pred 7:00 alebo po 15:00 - nič
    shiftTime.style.display="none";
    shiftAlertPlayed=false; // Reset keď nie je smena
    return;
  }
  shiftTime.innerText=text;
  shiftTime.style.color=color;
}

function playAlert(){
  try {
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    
    // Prvý tón - hlboký gong
    const osc1=ctx.createOscillator();
    const gain1=ctx.createGain();
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.frequency.value=180;
    gain1.gain.setValueAtTime(0.6,ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.05,ctx.currentTime+3.5);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime+3.5);
    
    // Druhý tón - vyšší "zvonenie" (harmonický)
    const osc2=ctx.createOscillator();
    const gain2=ctx.createGain();
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.frequency.value=360;
    gain2.gain.setValueAtTime(0.4,ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.02,ctx.currentTime+3.5);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime+3.5);
  } catch(e){}
}

// PREMIENNE PRE ZVUKY
let lunchAlertPlayed=false;

function updateLunch(){
  const n=new Date();
  const s=new Date();s.setHours(7,0,0,0);
  const l=new Date();l.setHours(10,30,0,0);
  const a=new Date();a.setHours(10,15,0,0); // Alert o 10:15
  const e=new Date();e.setHours(12,0,0,0);

  if(n>=s&&n<l){
    lunchTime.innerText="Obed o: "+format((l-n)/1000);lunchTime.style.display="block";
    // Zvuk keď je čas 10:15-10:20
    if(n>=a&&n<new Date(a.getTime()+5*60000)&&!lunchAlertPlayed){
      playAlert();
      lunchAlertPlayed=true;
    }
  }
  else if(n>=l&&n<e){
    lunchTime.innerText="Obed do 12:00";lunchTime.style.display="block";
    lunchAlertPlayed=false; // Reset pre ďalší deň
  }
  else {
    lunchTime.style.display="none";
    lunchAlertPlayed=false; // Reset keď nie je čas obeda
  }
}

// DOVOLENKA + VIANOCE
function updateVacation(){
  const n=new Date();
  const vacStart=new Date(2026,7,3); // 3.8.2026
  const christmas=new Date(2026,11,25); // 25.12.2026
  
  const diffVac=Math.ceil((vacStart-n)/(1000*60*60*24));
  const diffChrist=Math.ceil((christmas-n)/(1000*60*60*24));
  
  // Ak je POČAS dovolenky (3.8-9.8)
  if(n>=vacStart && n<=new Date(2026,7,9)){
    vacationTime.innerText="🏖️ DOVOLENKA 🏖️";
    vacationTime.style.display="block";
  }
  // Ak noch dovolenka
  else if(diffVac>0){
    vacationTime.innerText=`Dovolenka za ${diffVac} dní`;
    vacationTime.style.display="block";
  }
  else if(diffChrist>0){
    vacationTime.innerText=`Do Vianoc: ${diffChrist} dní`;
    vacationTime.style.display="block";
  }
  else {
    vacationTime.style.display="none";
  }
}

// PRACOVNÉ VOĽNO - SVIATKY (len pracovný týždeň)
function updateHolidays(){
  const n=new Date();
  const today=new Date(n.getFullYear(), n.getMonth(), n.getDate());
  
  // Sviatky SR 2026
  const holidays=[
    {date: new Date(2026,0,1), name:"Nový rok"},
    {date: new Date(2026,0,6), name:"Traja králi"},
    {date: new Date(2026,0,27), name:"Ľ. Štúr"},
    {date: new Date(2026,3,17), name:"Veľký piatok"}, // 2026
    {date: new Date(2026,3,20), name:"Veľkonočný pondelok"}, // 2026
    {date: new Date(2026,4,1), name:"Sviatok práce"},
    {date: new Date(2026,4,8), name:"Deň víťazstva"},
    {date: new Date(2026,6,5), name:"Sv. Cyril a Metod"},
    {date: new Date(2026,7,29), name:"Výročie SNP"},
    {date: new Date(2026,8,1), name:"Deň SR"},
    {date: new Date(2026,8,15), name:"Sedembolesná"},
    {date: new Date(2026,10,1), name:"Dušičky"},
    {date: new Date(2026,10,17), name:"Deň slobody"},
    {date: new Date(2026,11,24), name:"Štedrý deň"},
    {date: new Date(2026,11,25), name:"Vianoce"},
    {date: new Date(2026,11,26), name:"2. deň Vianoc"}
  ];
  
  // Nájdi najbližší sviatok v pracovnom týždni (1=po, 5=pi)
  let nextHoliday=null;
  let minDiff=Infinity;
  
  holidays.forEach(h=>{
    const dayOfWeek=h.date.getDay();
    // Zobrazuj len ak je sviatok v pracovnom týždni (1-5)
    if(dayOfWeek>=1 && dayOfWeek<=5){
      const diff=(h.date-today)/(1000*60*60*24);
      if(diff>=0 && diff<minDiff){
        minDiff=diff;
        nextHoliday=h;
      }
    }
  });
  
  if(nextHoliday){
    const daysLeft=Math.ceil(minDiff);
    if(daysLeft===0){
      document.getElementById('holidayDisplay').innerHTML=`🎉 ${nextHoliday.name}`;
    } else {
      document.getElementById('holidayDisplay').innerHTML=`🎉 ${nextHoliday.name}`;
    }
    document.getElementById('holidayDisplay').style.display="block";
  } else {
    document.getElementById('holidayDisplay').style.display="none";
  }
}

// PARSOVANIE ČLÁNKOV Z TERAZ.SK - PRIAME FETCHOVANIE
let newsBuffer = []; 
const MAX_NEWS = 15;

async function loadRSSFeeds(){
  try {
    // Priame fetchovanie bez proxy
    const response = await fetch('https://www.teraz.sk', {
      mode: 'cors',
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
      }
    });
    const html = await response.text();
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    
    const newArticles = [];
    
    // Nájsť články - h4/h3 tagy
    const allHeadings = doc.querySelectorAll('h4 a, h3 a');
    
    for(let link of allHeadings){
      const title = link.textContent.trim();
      
      // Preskočiť krátke a menu texty
      if(title.length < 12 || title.includes('Všetky') || title.includes('Viac') || title.includes('clanok')) continue;
      
      // Nájsť popis - hľadaj najbližší <p>
      let description = "";
      let parent = link.closest('div');
      if(parent){
        const pElements = parent.querySelectorAll('p');
        if(pElements.length > 0){
          description = pElements[0].textContent.trim().substring(0, 70);
        }
      }
      
      const fullNews = description ? `${title} — ${description}` : title;
      
      if(!newArticles.includes(fullNews) && newArticles.length < MAX_NEWS){
        newArticles.push(fullNews);
      }
    }
    
    // FIFO Buffer
    for(let article of newArticles){
      if(!newsBuffer.includes(article)){
        newsBuffer.unshift(article);
      }
    }
    
    if(newsBuffer.length > MAX_NEWS){
      newsBuffer = newsBuffer.slice(0, MAX_NEWS);
    }
    
    // Aktualizuj
    if(newsBuffer.length > 0){
      const separator = " ❖ ";
      const scrollText = newsBuffer.join(separator) + separator + newsBuffer.join(separator);
      document.getElementById('eventScroll').innerText = scrollText;
    } else {
      loadFallbackNews();
    }
    
  } catch(e){
    console.log("Chyba priamého fetch:", e);
    loadFallbackNews();
  }
}

function loadFallbackNews(){
  const newsItems = [
    "Slovensko - Nové opatrenia v oblasti zdravotníctva a sociálnych služieb",
    "Ekonomika - Rast HDP pokračuje pozitívnym trendom v poslednom kvartáli",
    "Šport - Slovenský futbal sa pripravuje na majstrovstvá sveta",
    "Zahraničie - NATO aktivovalo nové obranné sily vo Fínsku",
    "Zdravie - Nové očkovanie dostupné pre všetkých občanov"
  ];
  
  const separator = " ❖ ";
  const scrollText = newsItems.join(separator) + separator + newsItems.join(separator);
  document.getElementById('eventScroll').innerText = scrollText;
}

newsBuffer = [];
loadRSSFeeds();

// Refresh správ každých 30 sekúnd (deteguje nové články automaticky)
setInterval(loadRSSFeeds, 30 * 1000);
