<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system,Segoe UI;
}

.glass{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:15px;
}

.glow{text-shadow:0 0 15px rgba(255,255,255,0.4);}

#location{position:absolute;top:20px;left:40px;font-size:54px;}
#tempNow{margin-top:10px;font-size:32px;}

#clock-box{position:absolute;top:20px;right:40px;text-align:right;}
#time{font-size:160px;}
#dateWeek{font-size:36px;}

#weather{position:absolute;top:150px;left:40px;font-size:32px;}
.weather-today{margin-top:20px;}
.divider{height:1px;background:rgba(255,255,255,0.2);margin:10px 0;}
.weather-next{margin-top:5px;line-height:1.8;}

#nameday{position:absolute;top:300px;right:40px;font-size:32px;}

#world{
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city{text-align:center;}

.place{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:22px;
    margin-bottom:10px;
}

.flag{width:28px;height:18px;}

.city-time{font-size:40px;}
.city-weather{font-size:26px;}

#shiftBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:38px;
    text-align:center;
}
</style>
</head>

<body>

<div id="location" class="glow">
    Vráble
    <div id="tempNow"></div>
</div>

<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek"></div>
</div>

<div id="weather" class="glass"></div>
<div id="nameday" class="glass"></div>

<div id="shiftBox" class="glass">
    <div id="shiftTime"></div>
</div>

<div id="world">

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/mx.png">
        Mexiko – Ramos Arizpe
    </div>
    <div id="ramos" class="city-time"></div>
    <div id="ramosw" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/us.png">
        USA – Detroit
    </div>
    <div id="detroit" class="city-time"></div>
    <div id="detroitw" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/in.png">
        India – Pune
    </div>
    <div id="pune" class="city-time"></div>
    <div id="punew" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/cn.png">
        Čína – Suzhou
    </div>
    <div id="suzhou" class="city-time"></div>
    <div id="suzhouw" class="city-weather"></div>
</div>

</div>

<script>

function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000)/7);
}

function updateTime(){
    const n=new Date();
    time.innerText=n.toLocaleTimeString("sk-SK");

    let d=n.toLocaleDateString("sk-SK",{weekday:"long"});
    d=d.charAt(0).toUpperCase()+d.slice(1);

    dateWeek.innerText =
        d+" "+
        n.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})+
        " • týždeň "+getISOWeek(n);
}

function day(i){
    let d=new Date();
    d.setDate(d.getDate()+i);
    return d.toLocaleDateString("sk-SK",{weekday:"long"}).replace(/^./,c=>c.toUpperCase());
}

// ✅ presné ikonky
function icon(code){
    if(code === 0) return "☀️";
    if([1,2].includes(code)) return "🌤️";
    if(code === 3) return "☁️";
    if([45,48].includes(code)) return "🌫️";
    if(code >= 51 && code <= 57) return "🌦️";
    if(code >= 61 && code <= 67) return "🌧️";
    if(code >= 71 && code <= 77) return "❄️";
    if(code >= 80 && code <= 82) return "🌧️";
    if([95,96,99].includes(code)) return "⛈️";
    return "🌤️";
}

function windDir(deg){
    const dirs=["S","SV","V","JV","J","JZ","Z","SZ"];
    return dirs[Math.round(deg/45)%8];
}

function getDirection(deg){
    if(deg>=315 || deg<45) return "od Nitry";
    if(deg>=45 && deg<135) return "od Levíc";
    if(deg>=135 && deg<225) return "od Nových Zámkov";
    return "od Zlatých Moraviec";
}

async function loadWeather(){

const res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&hourly=weathercode,precipitation_probability,winddirection_10m&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,winddirection_10m_dominant&current_weather=true&timezone=Europe/Bratislava");
const data=await res.json();
const d=data.daily;

let alert="";
let now=new Date();

for(let i=0;i<data.hourly.time.length;i++){
    let t=new Date(data.hourly.time[i]);
    let diff=(t-now)/60000;

    if(diff>0 && diff<90){
        let code=data.hourly.weathercode[i];
        let prob=data.hourly.precipitation_probability[i];
        let dir=getDirection(data.hourly.winddirection_10m[i]);

        if([95,96,99].includes(code)){
            alert=` ⚡ Búrka o ~${Math.round(diff)} min (${dir})`;
            break;
        }

        if(code>=61){
            alert=` 🌧️ Dážď o ~${Math.round(diff)} min (${prob}% - ${dir})`;
            break;
        }
    }
}

if(alert==="") alert=" ☀️ Bez zrážok";

tempNow.innerText =
`Aktuálna teplota: ${Math.round(data.current_weather.temperature)}°${alert}`;

weather.innerHTML = `
<div class="weather-today">
Dnes: ${icon(d.weathercode[0])} ${Math.round(d.temperature_2m_max[0])}° / ${Math.round(d.temperature_2m_min[0])}°
 | 💨 ${Math.round(d.windspeed_10m_max[0])} km/h ${windDir(d.winddirection_10m_dominant[0])}
</div>

<div class="divider"></div>

<div class="weather-next">
${day(1)}: ${icon(d.weathercode[1])} ${Math.round(d.temperature_2m_max[1])}° / ${Math.round(d.temperature_2m_min[1])}°
 | 💨 ${Math.round(d.windspeed_10m_max[1])} km/h ${windDir(d.winddirection_10m_dominant[1])}
<br>
${day(2)}: ${icon(d.weathercode[2])} ${Math.round(d.temperature_2m_max[2])}° / ${Math.round(d.temperature_2m_min[2])}°
 | 💨 ${Math.round(d.windspeed_10m_max[2])} km/h ${windDir(d.winddirection_10m_dominant[2])}
<br>
${day(3)}: ${icon(d.weathercode[3])} ${Math.round(d.temperature_2m_max[3])}° / ${Math.round(d.temperature_2m_min[3])}°
 | 💨 ${Math.round(d.windspeed_10m_max[3])} km/h ${windDir(d.winddirection_10m_dominant[3])}
</div>`;
}

function world(){
ramos.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Monterrey",hour12:false});
detroit.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Detroit",hour12:false});
pune.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Kolkata",hour12:false});
suzhou.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Shanghai",hour12:false});
}

async function worldWeather(){
const cities={
    ramos:[25.54,-100.94,"ramosw"],
    detroit:[42.33,-83.05,"detroitw"],
    pune:[18.52,73.85,"punew"],
    suzhou:[31.30,120.62,"suzhouw"]
};

for(let key in cities){
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${cities[key][0]}&longitude=${cities[key][1]}&current_weather=true`);
    const data=await res.json();

    document.getElementById(cities[key][2]).innerText =
        icon(data.current_weather.weathercode) + " " +
        Math.round(data.current_weather.temperature)+"°";
}
}

function updateShift(){
    const now=new Date();
    const start=new Date(); start.setHours(7,0,0,0);
    const end=new Date(); end.setHours(15,0,0,0);

    let text="",color="white",diff;

    if(now<start){
        diff=Math.floor((start-now)/1000);
        text="Do smeny: "+format(diff);
    }
    else if(now<=end){
        diff=Math.floor((end-now)/1000);

        if(diff<=1800) color="#ff3b3b";
        else if(diff<=3600) color="#ff9f0a";
        else color="#00ff88";

        text="Do konca smeny: "+format(diff);
    }
    else{
        let next=new Date();
        next.setDate(next.getDate()+1);
        next.setHours(7,0,0,0);

        diff=Math.floor((next-now)/1000);
        text="Do ďalšej smeny: "+format(diff);
    }

    shiftTime.innerText=text;
    shiftTime.style.color=color;
}

function format(sec){
    let h=Math.floor(sec/3600);
    let m=Math.floor((sec%3600)/60);
    let s=sec%60;
    return `${h}h ${m}m ${s}s`;
}

function updateNameday(){
nameday.innerHTML="Dnes má meniny: Karolína<br>Zajtra má meniny: Lenka";
}

setInterval(()=>{
    updateTime();
    world();
    updateShift();
},1000);

updateTime();
world();
updateNameday();
updateShift();
loadWeather();
worldWeather();

setInterval(()=>location.reload(),60000);

</script>
</body>
</html>
