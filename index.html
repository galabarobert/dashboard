<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Apple Dashboard</title>

<style>
body {
    margin:0;
    background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
    color:white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    overflow:hidden;
}

/* GLASS PANEL */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 0 30px rgba(255,255,255,0.1);
}

/* glow */
.glow {
    text-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* VRABLE */
#location {
    position:absolute;
    top:25px;
    left:40px;
    font-size:52px;
}

/* teplota */
#tempNow {
    margin-top:10px;
    font-size:32px;
}

/* hodiny */
#clock-box {
    position:absolute;
    top:20px;
    right:40px;
    text-align:right;
}
#time {
    font-size:170px;
    font-weight:600;
}
#dateWeek {
    font-size:34px;
}

/* počasie */
#weather {
    position:absolute;
    top:140px;
    left:40px;
    font-size:32px;
    line-height:1.6;
}

/* mesiac */
#moon {
    position:absolute;
    top:340px;
    left:40px;
    font-size:34px;
}

/* meniny */
#nameday {
    position:absolute;
    top:360px;
    right:40px;
    font-size:32px;
}

/* svet */
#world {
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city {
    text-align:center;
    font-size:26px;
}

.place {
    margin-bottom:8px;
}

/* fade animacia */
.fade {
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- VRABLE -->
<div id="location" class="glow fade">
    Vráble
    <div id="tempNow"></div>
</div>

<!-- CLOCK -->
<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek" class="fade"></div>
</div>

<!-- POČASIE -->
<div id="weather" class="glass fade"></div>

<!-- MESIAC -->
<div id="moon" class="glass glow fade"></div>

<!-- MENINY -->
<div id="nameday" class="glass fade"></div>

<!-- SVET -->
<div id="world">

    <div class="city glass">
        <div class="place">🇲🇽 Mexiko – Ramos Arizpe</div>
        <div id="ramos"></div>
        <div id="ramosw"></div>
    </div>

    <div class="city glass">
        <div class="place">🇺🇸 USA – Detroit</div>
        <div id="detroit"></div>
        <div id="detroitw"></div>
    </div>

    <div class="city glass">
        <div class="place">🇮🇳 India – Pune</div>
        <div id="pune"></div>
        <div id="punew"></div>
    </div>

    <div class="city glass">
        <div class="place">🇨🇳 Čína – Suzhou</div>
        <div id="suzhou"></div>
        <div id="suzhouw"></div>
    </div>

</div>

<script>

// ISO týždeň
function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

// čas
function updateTime(){
    const now=new Date();

    time.innerText = now.toLocaleTimeString("sk-SK");
    dateWeek.innerText =
        now.toLocaleDateString("sk-SK",
        {weekday:"long",year:"numeric",month:"long",day:"numeric"})
        + " • týždeň " + getISOWeek(now);
}

// svet časy
function world(){
    const zones={
        ramos:"America/Monterrey",
        detroit:"America/Detroit",
        pune:"Asia/Kolkata",
        suzhou:"Asia/Shanghai"
    };

    for(let id in zones){
        document.getElementById(id).innerText =
        new Date().toLocaleTimeString("en-US",{timeZone:zones[id]});
    }
}

// meniny
const namedays={
    "6-2":"Karolína",
    "6-3":"Lenka"
};

function updateNameday(){
    const d=new Date();
    const today=(d.getMonth()+1)+"-"+d.getDate();

    const t=new Date(d);
    t.setDate(d.getDate()+1);
    const tomorrow=(t.getMonth()+1)+"-"+t.getDate();

    nameday.innerHTML =
    "Dnes má meniny: "+(namedays[today]||"...")+"<br>"+
    "Zajtra má meniny: "+(namedays[tomorrow]||"...");
}

// presná fáza mesiaca
function updateMoon(){
    const now=new Date();
    const cycle=29.53058867;
    const base=new Date(Date.UTC(2000,0,6,18,14));
    const days=(now-base)/86400000;
    const phase=(days%cycle+cycle)%cycle;

    let text="";
    if(phase<1) text="🌑 Nov";
    else if(phase<7.4) text="🌒 Dorastajúci kosák";
    else if(phase<9.2) text="🌓 Prvá štvrť";
    else if(phase<14.8) text="🌔 Dorastajúci mesiac";
    else if(phase<16.6) text="🌕 Spln";
    else if(phase<22.1) text="🌖 Ubúdajúci mesiac";
    else if(phase<24) text="🌗 Posledná štvrť";
    else text="🌘 Ubúdajúci kosák";

    moon.innerText=text;
}

// ikonky
function icon(t){
    if(t>30) return "☀️";
    if(t>20) return "⛅";
    return "🌧️";
}

// lokálne počasie
async function loadWeather(){
    const res=await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Europe/Bratislava"
    );

    const data=await res.json();
    const d=data.daily;

    tempNow.innerText =
        "Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°";

    weather.innerHTML =
    "Dnes: "+icon(d.temperature_2m_max[0])+" "+Math.round(d.temperature_2m_max[0])+"° / "+Math.round(d.temperature_2m_min[0])+"°<br>"+
    "Zajtra: "+icon(d.temperature_2m_max[1])+" "+Math.round(d.temperature_2m_max[1])+"° / "+Math.round(d.temperature_2m_min[1])+"°<br>"+
    "Pozajtra: "+icon(d.temperature_2m_max[2])+" "+Math.round(d.temperature_2m_max[2])+"° / "+Math.round(d.temperature_2m_min[2])+"°";
}

// svet počasie MAX
async function worldWeather(){
    const cities={
        ramos:[25.54,-100.94,"ramosw"],
        detroit:[42.33,-83.05,"detroitw"],
        pune:[18.52,73.85,"punew"],
        suzhou:[31.30,120.62,"suzhouw"]
    };

    for(let key in cities){
        const [lat,lon,id]=cities[key];

        const res=await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&timezone=auto`
        );

        const data=await res.json();

        const temp = Math.round(data.daily.temperature_2m_max[0]);

        document.getElementById(id).innerText =
            icon(temp)+" "+temp+"°";
    }
}

// LOOP
setInterval(()=>{
    updateTime();
    world();
    updateMoon();
},1000);

updateTime();
world();
updateMoon();
updateNameday();
loadWeather();
worldWeather();

</script>

</body>
</html>
``
