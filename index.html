<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard FINAL</title>

<style>
body {
    margin:0;
    background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
    color:white;
    font-family: -apple-system, Segoe UI;
    overflow:hidden;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
}

/* glow */
.glow {
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* layout */
#location { position:absolute; top:20px; left:40px; font-size:54px; }
#tempNow { margin-top:20px; font-size:32px; }

#clock-box { position:absolute; top:20px; right:40px; text-align:right; }
#time { font-size:160px; }
#dateWeek { font-size:36px; }

#weather { position:absolute; top:160px; left:40px; font-size:32px; line-height:1.8; }
#moon { position:absolute; top:360px; left:40px; font-size:32px; }
#nameday { position:absolute; top:360px; right:40px; font-size:32px; }

#world {
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}
.city { text-align:center; font-size:24px; }
.place { margin-bottom:8px; }
</style>
</head>

<body>

<div id="location" class="glow">
    Vráble
    <div id="tempNow"></div>
</div>

<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek"></div>
</div>

<div id="weather" class="glass"></div>
<div id="moon" class="glass glow"></div>
<div id="nameday" class="glass"></div>

<div id="world">

    <div class="city glass">
        <div class="place">🇲🇽 Mexiko – Ramos Arizpe</div>
        <div id="ramos"></div>
        <div id="ramosw"></div>
    </div>

    <div class="city glass">
        <div class="place">🇺🇸 USA – Detroit</div>
        <div id="detroit"></div>
        <div id="detroitw"></div>
    </div>

    <div class="city glass">
        <div class="place">🇮🇳 India – Pune</div>
        <div id="pune"></div>
        <div id="punew"></div>
    </div>

    <div class="city glass">
        <div class="place">🇨🇳 Čína – Suzhou</div>
        <div id="suzhou"></div>
        <div id="suzhouw"></div>
    </div>

</div>

<script>

// ISO týždeň
function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

// čas
function updateTime(){
    const now=new Date();

    document.getElementById("time").innerText =
        now.toLocaleTimeString("sk-SK");

    let day = now.toLocaleDateString("sk-SK",{weekday:"long"});
    day = day.charAt(0).toUpperCase()+day.slice(1);

    document.getElementById("dateWeek").innerText =
        day+" "+
        now.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})
        +" • týždeň "+getISOWeek(now);
}

// svet čas 24h
function world(){
    const zones={
        ramos:"America/Monterrey",
        detroit:"America/Detroit",
        pune:"Asia/Kolkata",
        suzhou:"Asia/Shanghai"
    };

    for(let id in zones){
        document.getElementById(id).innerText =
        new Date().toLocaleTimeString("sk-SK",{
            timeZone:zones[id],
            hour12:false
        });
    }
}

// meniny
const namedays={"6-2":"Karolína","6-3":"Lenka"};

function updateNameday(){
    const d=new Date();
    const today=(d.getMonth()+1)+"-"+d.getDate();
    const t=new Date(d); t.setDate(d.getDate()+1);
    const tomorrow=(t.getMonth()+1)+"-"+t.getDate();

    document.getElementById("nameday").innerHTML =
        "Dnes má meniny: "+(namedays[today]||"...")+"<br><br>"+
        "Zajtra má meniny: "+(namedays[tomorrow]||"...");
}

// mesiac
function updateMoon(){
    const now=new Date();
    const cycle=29.53;
    const base=new Date(2000,0,6);
    const phase=((now-base)/86400000)%cycle;

    let text="";
    if(phase<7.4) text="🌑 Nov";
    else if(phase<14.8) text="🌓 Prvá štvrť";
    else if(phase<22.1) text="🌕 Spln";
    else text="🌗 Posledná štvrť";

    document.getElementById("moon").innerText=text;
}

// ikonky (iOS feel)
function icon(t){
    if(t>=30) return "☀️";
    if(t>=24) return "🌤️";
    if(t>=20) return "🌥️";
    if(t>=15) return "🌧️";
    return "🌩️";
}

// hlavné počasie
async function loadWeather(){
    const res=await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Europe/Bratislava"
    );
    const data=await res.json();
    const d=data.daily;

    document.getElementById("tempNow").innerText =
        "Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°";

    document.getElementById("weather").innerHTML =
        "<br>"+
        "Dnes: "+icon(d.temperature_2m_max[0])+" "+Math.round(d.temperature_2m_max[0])+"° / "+Math.round(d.temperature_2m_min[0])+"°<br><br>"+
        "Zajtra: "+icon(d.temperature_2m_max[1])+" "+Math.round(d.temperature_2m_max[1])+"° / "+Math.round(d.temperature_2m_min[1])+"°<br>"+
        "Pozajtra: "+icon(d.temperature_2m_max[2])+" "+Math.round(d.temperature_2m_max[2])+"° / "+Math.round(d.temperature_2m_min[2])+"°";
}

// svet počasie (max)
async function worldWeather(){
    const cities={
        ramos:[25.54,-100.94,"ramosw"],
        detroit:[42.33,-83.05,"detroitw"],
        pune:[18.52,73.85,"punew"],
        suzhou:[31.30,120.62,"suzhouw"]
    };

    for(let key in cities){
        const [lat,lon,id]=cities[key];

        const res=await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&timezone=auto`
        );

        const data=await res.json();

        const temp=Math.round(data.daily.temperature_2m_max[0]);

        document.getElementById(id).innerText =
            icon(temp)+" "+temp+"°";
    }
}

// loop (refresh údajov)
setInterval(()=>{
    updateTime();
    world();
    updateMoon();
},1000);

// INIT
updateTime();
world();
updateMoon();
updateNameday();
loadWeather();
worldWeather();

// ✅ AUTO REFRESH 15 MIN
setInterval(()=>{
    location.reload();
}, 900000);

</script>

</body>
</html>
