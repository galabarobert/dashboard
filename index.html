<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system, Segoe UI;
    overflow:hidden;
}

.glass {
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:15px;
}

.glow {
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* layout */
#location {position:absolute;top:20px;left:40px;font-size:54px;}
#tempNow {margin-top:10px;font-size:32px;}

#clock-box {position:absolute;top:20px;right:40px;text-align:right;}
#time {font-size:160px;}
#dateWeek {font-size:36px;}

#weather {position:absolute;top:150px;left:40px;font-size:32px;}

.weather-today {margin-top:20px;}

.divider {
    height:1px;
    background:rgba(255,255,255,0.2);
    margin:10px 0;
}

.weather-next {margin-top:5px;line-height:1.6;}

#nameday {position:absolute;top:300px;right:40px;font-size:32px;}

/* WORLD */
#world{
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city{text-align:center;}

.place{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:22px;
    margin-bottom:10px;
}

.flag{
    width:28px;
    height:18px;
    border-radius:3px;
}

.city-time{font-size:40px;margin-bottom:6px;}
.city-weather{font-size:26px;}
</style>
</head>

<body>

<div id="location" class="glow">
    Vráble
    <div id="tempNow"></div>
</div>

<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek"></div>
</div>

<div id="weather" class="glass"></div>
<div id="nameday" class="glass"></div>

<div id="world">

    <div class="city glass">
        <div class="place">
            <img src="https://flagcdn.com/w40/mx.png" class="flag">
            Mexiko – Ramos Arizpe
        </div>
        <div class="city-time" id="ramos"></div>
        <div class="city-weather" id="ramosw"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img src="https://flagcdn.com/w40/us.png" class="flag">
            USA – Detroit
        </div>
        <div class="city-time" id="detroit"></div>
        <div class="city-weather" id="detroitw"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img src="https://flagcdn.com/w40/in.png" class="flag">
            India – Pune
        </div>
        <div class="city-time" id="pune"></div>
        <div class="city-weather" id="punew"></div>
    </div>

    <div class="city glass">
        <div class="place">
            <img src="https://flagcdn.com/w40/cn.png" class="flag">
            Čína – Suzhou
        </div>
        <div class="city-time" id="suzhou"></div>
        <div class="city-weather" id="suzhouw"></div>
    </div>

</div>

<script>

// ISO týždeň
function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

// čas + dátum
function updateTime(){
    const now=new Date();

    document.getElementById("time").innerText =
        now.toLocaleTimeString("sk-SK");

    let d = now.toLocaleDateString("sk-SK",{weekday:"long"});
    d = d.charAt(0).toUpperCase()+d.slice(1);

    document.getElementById("dateWeek").innerText =
        d+" "+
        now.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})+
        " • týždeň "+getISOWeek(now);
}

// názvy dní
function getDayName(i){
    let d=new Date();
    d.setDate(d.getDate()+i);
    return d.toLocaleDateString("sk-SK",{weekday:"long"})
        .replace(/^./,c=>c.toUpperCase());
}

// ikonky
function icon(t){
    if(t>=30) return "☀️";
    if(t>=24) return "🌤️";
    if(t>=20) return "🌥️";
    if(t>=15) return "🌧️";
    return "🌩️";
}

// stav počasia
function getCondition(code){
    if(code==0) return "☀️ Jasno";
    if(code<=2) return "🌤️ Polooblačno";
    if(code==3) return "🌥️ Oblačno";
    return "🌥️ Oblačno";
}

// WEATHER + ALERT
async function loadWeather(){
    const res=await fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=temperature_2m_max,temperature_2m_min&hourly=weathercode,precipitation_probability&current_weather=true&timezone=Europe/Bratislava"
    );

    const data=await res.json();
    const d=data.daily;

    let alert="";
    let now=new Date();

    for(let i=0;i<data.hourly.time.length;i++){
        let t=new Date(data.hourly.time[i]);
        let diff=(t-now)/60000;
        let code=data.hourly.weathercode[i];
        let prob=data.hourly.precipitation_probability[i];

        if(diff>0 && diff<180){

            if([95,96,99].includes(code)){
                alert=" ⚡ Búrka o ~"+Math.round(diff)+" min";
                break;
            }

            if(code>=61){
                alert=" 🌧️ Dážď o ~"+Math.round(diff)+" min ("+(prob||0)+"%)";
                break;
            }
        }
    }

    if(alert===""){
        alert=" "+getCondition(data.current_weather.weathercode);
    }

    document.getElementById("tempNow").innerText =
        "Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°"+alert;

    document.getElementById("weather").innerHTML =
        `<div class="weather-today">
            Dnes: ${icon(d.temperature_2m_max[0])} ${Math.round(d.temperature_2m_max[0])}° / ${Math.round(d.temperature_2m_min[0])}°
        </div>

        <div class="divider"></div>

        <div class="weather-next">
            ${getDayName(1)}: ${icon(d.temperature_2m_max[1])} ${Math.round(d.temperature_2m_max[1])}° / ${Math.round(d.temperature_2m_min[1])}°<br>
            ${getDayName(2)}: ${icon(d.temperature_2m_max[2])} ${Math.round(d.temperature_2m_max[2])}° / ${Math.round(d.temperature_2m_min[2])}°<br>
            ${getDayName(3)}: ${icon(d.temperature_2m_max[3])} ${Math.round(d.temperature_2m_max[3])}° / ${Math.round(d.temperature_2m_min[3])}°
        </div>`;
}

// MENINY
function updateNameday(){
    document.getElementById("nameday").innerHTML =
        "Dnes má meniny: Karolína<br>Zajtra má meniny: Lenka";
}

// WORLD TIME
function world(){
    document.getElementById("ramos").innerText =
        new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Monterrey",hour12:false});
    document.getElementById("detroit").innerText =
        new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Detroit",hour12:false});
    document.getElementById("pune").innerText =
        new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Kolkata",hour12:false});
    document.getElementById("suzhou").innerText =
        new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Shanghai",hour12:false});
}

// LOOP
setInterval(()=>{
    updateTime();
    world();
},1000);

// INIT
updateTime();
world();
updateNameday();
loadWeather();

// AUTO REFRESH
setInterval(()=>location.reload(),900000);

</script>

</body>
</html>
