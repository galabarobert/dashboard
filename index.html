<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard ULTRA</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Segoe UI, Arial;
    overflow:hidden;
}

/* glow efekt */
.glow {
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* univerzálny text */
.big {
    font-size:32px;
}

/* Vráble + teplota */
#location {
    position:absolute;
    top:20px;
    left:30px;
}

#tempNow {
    margin-top:10px;
    font-size:28px;
}

/* hodiny */
#clock-box {
    position:absolute;
    top:20px;
    right:40px;
    text-align:right;
}
#time {
    font-size:150px;
    font-weight:bold;
}
#dateWeek {
    font-size:30px;
}

/* meniny */
#nameday {
    position:absolute;
    top:320px;
    right:40px;
    line-height:1.5;
}

/* počasie */
#weather {
    position:absolute;
    top:120px;
    left:30px;
    line-height:1.6;
}

/* mesiac */
#moon {
    position:absolute;
    top:300px;
    left:30px;
}

/* svet */
#world {
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city {
    text-align:center;
    font-size:26px;
}
</style>
</head>

<body>

<!-- VRABLE -->
<div id="location" class="glow big">
    Vráble
    <div id="tempNow"></div>
</div>

<!-- HODINY -->
<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek" class="glow"></div>
</div>

<div id="nameday" class="glow big"></div>
<div id="weather" class="glow big"></div>
<div id="moon" class="glow big"></div>

<!-- SVET -->
<div id="world">
    <div class="city">New York<br><span id="ny"></span><br><span id="nyw"></span></div>
    <div class="city">Londýn<br><span id="lon"></span><br><span id="lonw"></span></div>
    <div class="city">Tokio<br><span id="tokyo"></span><br><span id="tokyow"></span></div>
    <div class="city">Sydney<br><span id="sydney"></span><br><span id="sydneyw"></span></div>
    <div class="city">Dubai<br><span id="dubai"></span><br><span id="dubaiw"></span></div>
</div>

<script>

// čas
function updateTime(){
    const now=new Date();

    time.innerText = now.toLocaleTimeString("sk-SK");

    dateWeek.innerText =
        now.toLocaleDateString("sk-SK",
        {weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
    
// svet čas
function world(){
    const zones={
        ny:"America/New_York",
        lon:"Europe/London",
        tokyo:"Asia/Tokyo",
        sydney:"Australia/Sydney",
        dubai:"Asia/Dubai"
    };

    for(let id in zones){
        document.getElementById(id).innerText =
        new Date().toLocaleTimeString("en-US",{timeZone:zones[id]});
    }
}

// meniny
const namedays={
    "6-2":"Karolína",
    "6-3":"Lenka"
};

function updateNameday(){
    const d=new Date();

    const today=(d.getMonth()+1)+"-"+d.getDate();

    const t=new Date(d);
    t.setDate(d.getDate()+1);
    const tomorrow=(t.getMonth()+1)+"-"+t.getDate();

    nameday.innerHTML =
        "Dnes má meniny: "+(namedays[today]||"...")+"<br>"+
        "Zajtra má meniny: "+(namedays[tomorrow]||"...");
}

// fáza mesiaca (opravená)
function updateMoon(){
    const now=new Date();
    const lp=29.530588853;
    const base=new Date(2000,0,6,18,14);
    const phase=((now-base)/86400000)%lp;

    let text="";
    if(phase<7.4) text="🌑 Nov";
    else if(phase<14.8) text="🌓 Prvá štvrť";
    else if(phase<22.1) text="🌕 Spln";
    else text="🌗 Posledná štvrť";

    moon.innerText = text;
}

// ikonky
function icon(t){
    if(t>25) return "☀️";
    if(t>18) return "⛅";
    return "🌧️";
}

// hlavné počasie + aktuálna teplota
async function loadWeather(){
    const res=await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Europe/Bratislava"
    );

    const data=await res.json();
    const d=data.daily;

    // aktuálna teplota
    tempNow.innerText =
        "Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°";

    weather.innerHTML =
    "Dnes: "+icon(d.temperature_2m_max[0])+" "+Math.round(d.temperature_2m_max[0])+"° / "+Math.round(d.temperature_2m_min[0])+"°<br>"+
    "Zajtra: "+icon(d.temperature_2m_max[1])+" "+Math.round(d.temperature_2m_max[1])+"° / "+Math.round(d.temperature_2m_min[1])+"°<br>"+
    "Pozajtra: "+icon(d.temperature_2m_max[2])+" "+Math.round(d.temperature_2m_max[2])+"° / "+Math.round(d.temperature_2m_min[2])+"°";
}

// svet počasie
async function worldWeather(){
    const cities = {
        ny:[40.71,-74.0,"nyw"],
        lon:[51.50,-0.12,"lonw"],
        tokyo:[35.67,139.65,"tokyow"],
        sydney:[-33.86,151.2,"sydneyw"],
        dubai:[25.20,55.27,"dubaiw"]
    };

    for(let key in cities){
        const [lat,lon,id]=cities[key];

        const res=await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
        );
        const data=await res.json();

        const temp=Math.round(data.current_weather.temperature);

        document.getElementById(id).innerText = icon(temp)+" "+temp+"°";
    }
}

// loop
setInterval(()=>{
    updateTime();
    world();
    updateMoon();
},1000);

updateTime();
world();
updateMoon();
updateNameday();
loadWeather();
worldWeather();

</script>

</body>
</html>
``
