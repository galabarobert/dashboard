<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:-apple-system, Segoe UI;
}

.glass {
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:15px;
}

.glow {
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

#location {position:absolute;top:20px;left:40px;font-size:54px;}
#tempNow {margin-top:10px;font-size:32px;}

#clock-box {position:absolute;top:20px;right:40px;text-align:right;}
#time {font-size:160px;}
#dateWeek {font-size:36px;}

#weather {position:absolute;top:150px;left:40px;font-size:32px;}

.weather-today {margin-top:20px;}

.divider {
    height:1px;
    background:rgba(255,255,255,0.2);
    margin:10px 0;
}

.weather-next {margin-top:5px;line-height:1.6;}

#nameday {position:absolute;top:300px;right:40px;font-size:32px;}

#world{
    position:absolute;
    bottom:30px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
}

.city{text-align:center;}

.place{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:22px;
    margin-bottom:10px;
}

.flag{
    width:28px;
    height:18px;
}

.city-time{font-size:40px;}
.city-weather{font-size:26px;}
</style>
</head>

<body>

<div id="location" class="glow">
    Vráble
    <div id="tempNow"></div>
</div>

<div id="clock-box">
    <div id="time" class="glow"></div>
    <div id="dateWeek"></div>
</div>

<div id="weather" class="glass"></div>
<div id="nameday" class="glass"></div>

<div id="world">

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/mx.png"> Mexiko – Ramos Arizpe
    </div>
    <div id="ramos" class="city-time"></div>
    <div id="ramosw" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/us.png"> USA – Detroit
    </div>
    <div id="detroit" class="city-time"></div>
    <div id="detroitw" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/in.png"> India – Pune
    </div>
    <div id="pune" class="city-time"></div>
    <div id="punew" class="city-weather"></div>
</div>

<div class="city glass">
    <div class="place">
        <img class="flag" src="https://flagcdn.com/w40/cn.png"> Čína – Suzhou
    </div>
    <div id="suzhou" class="city-time"></div>
    <div id="suzhouw" class="city-weather"></div>
</div>

</div>

<script>

// týždeň
function getISOWeek(d){
    const date=new Date(d);
    date.setDate(date.getDate()+3-(date.getDay()+6)%7);
    const week1=new Date(date.getFullYear(),0,4);
    return 1+Math.round(((date-week1)/86400000)/7);
}

// čas
function updateTime(){
    const n=new Date();

    time.innerText=n.toLocaleTimeString("sk-SK");

    let d=n.toLocaleDateString("sk-SK",{weekday:"long"});
    d=d.charAt(0).toUpperCase()+d.slice(1);

    dateWeek.innerText =
        d+" "+
        n.toLocaleDateString("sk-SK",{day:"numeric",month:"long",year:"numeric"})+
        " • týždeň "+getISOWeek(n);
}

// dni
function day(i){
    let d=new Date();
    d.setDate(d.getDate()+i);
    return d.toLocaleDateString("sk-SK",{weekday:"long"}).replace(/^./,c=>c.toUpperCase());
}

// ikonky
function icon(t){
    if(t>=30) return "☀️";
    if(t>=24) return "🌤️";
    if(t>=20) return "🌥️";
    if(t>=15) return "🌧️";
    return "🌩️";
}

// radar-like alert
async function loadWeather(){

const res=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=48.24&longitude=18.32&hourly=weathercode,precipitation_probability&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Europe/Bratislava"
);
const data=await res.json();
const d=data.daily;

let alert="";
let now=new Date();

// ✅ RADAR MODE (najbližších ~90 min)
for(let i=0;i<data.hourly.time.length;i++){
    let t=new Date(data.hourly.time[i]);
    let diff=(t-now)/60000;

    if(diff>0 && diff<90){

        let code=data.hourly.weathercode[i];
        let prob=data.hourly.precipitation_probability[i];

        if([95,96,99].includes(code)){
            alert=" ⚡ Búrka o ~"+Math.round(diff)+" min";
            break;
        }

        if(code>=61){
            alert=" 🌧️ Dážď o ~"+Math.round(diff)+" min ("+prob+"%)";
            break;
        }
    }
}

// fallback stav
if(alert===""){
    alert=" ☀️ Bez zrážok";
}

tempNow.innerText=
"Aktuálna teplota: "+Math.round(data.current_weather.temperature)+"°"+alert;

weather.innerHTML=
`<div class="weather-today">
Dnes: ${icon(d.temperature_2m_max[0])} ${d.temperature_2m_max[0]}° / ${d.temperature_2m_min[0]}°
</div>

<div class="divider"></div>

<div class="weather-next">
${day(1)}: ${icon(d.temperature_2m_max[1])} ${d.temperature_2m_max[1]}° / ${d.temperature_2m_min[1]}°<br>
${day(2)}: ${icon(d.temperature_2m_max[2])} ${d.temperature_2m_max[2]}° / ${d.temperature_2m_min[2]}°<br>
${day(3)}: ${icon(d.temperature_2m_max[3])} ${d.temperature_2m_max[3]}° / ${d.temperature_2m_min[3]}°
</div>`;
}

// meniny
function updateNameday(){
nameday.innerHTML="Dnes má meniny: Karolína<br>Zajtra má meniny: Lenka";
}

// world time
function world(){
ramos.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Monterrey",hour12:false});
detroit.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"America/Detroit",hour12:false});
pune.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Kolkata",hour12:false});
suzhou.innerText=new Date().toLocaleTimeString("sk-SK",{timeZone:"Asia/Shanghai",hour12:false});
}

// loop
setInterval(()=>{updateTime(); world();},1000);

// init
updateTime();
world();
updateNameday();
loadWeather();

// ✅ refresh každú 1 min
setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
